<!-- src/app/features/master/training-location/training-location.component.html -->
<app-layout pageTitle="Training Location">

  <div class="d-flex justify-content-end align-items-center mt-3 mb-2 gap-2">
    <div class="input-group" style="width:250px;">
      <span class="input-group-text bg-white border-end-0"><i class="bx bx-search text-muted"></i></span>
      <input type="text" class="form-control border-start-0 ps-0"
             placeholder="Search Location..." [(ngModel)]="searchText">
    </div>
    <button class="btn btn-rounded btn-dark" (click)="openNewModal()">
      <i class="fa fa-plus me-1"></i> Add Location
    </button>
  </div>

  <table class="table table-hover shadow">
    <thead class="table-dark">
      <tr><th>Location</th><th>Place</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let loc of filteredList" class="cursor-pointer" (click)="openEditModal(loc)" style="cursor:pointer;">
        <td>{{ loc.name }}</td>
        <td>
          <span *ngFor="let d of loc.detail"
                class="badge bg-label-secondary me-1 mb-1">{{ d.place }}</span>
        </td>
      </tr>
      <tr *ngIf="filteredList.length === 0">
        <td colspan="2" class="text-center">No locations found</td>
      </tr>
    </tbody>
  </table>

  <!-- Add Location Modal -->
  <div class="modal fade" id="newLocationModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header border-bottom pb-3">
          <h5 class="modal-title w-100">
            Training Location
            <span class="float-end text-danger" style="font-size:12px;">(*) Required</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-1">
            <label class="form-label">Location <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="newLocation.name" placeholder="Enter Location">
          </div>
          <div class="mt-3">
            <label class="form-label d-flex justify-content-between">
              Place
              <button class="btn btn-primary btn-sm" (click)="addPlaceField(newLocation.places)">+</button>
            </label>
            <div *ngFor="let p of newLocation.places; let i = index" class="row mb-2">
              <div class="col-sm-10">
                <input type="text" class="form-control" [(ngModel)]="newLocation.places[i].place" placeholder="Enter Place">
              </div>
              <div class="col-sm-1 d-flex align-items-center" *ngIf="i > 0">
                <i class="fa fa-trash text-danger" style="cursor:pointer;" (click)="removePlaceField(newLocation.places, i)"></i>
              </div>
            </div>
          </div>
          <div class="text-end mt-3">
            <button class="btn btn-primary" (click)="submitLocation()" [disabled]="isSubmitting">Submit</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Location Modal -->
  <div class="modal fade" id="editLocationModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title w-100">
            Edit Location
            <span class="float-end text-danger" style="font-size:12px;">(*) Required</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-1">
            <label class="form-label">Location <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="editLocation.name" placeholder="Location">
          </div>
          <div class="mt-3">
            <label class="form-label d-flex justify-content-between">
              Places
              <button class="btn btn-primary btn-sm" (click)="addPlaceField(editLocation.places)">+</button>
            </label>
            <div *ngFor="let p of editLocation.places; let i = index" class="row mb-2">
              <div class="col-sm-10">
                <input type="text" class="form-control" [(ngModel)]="editLocation.places[i].place" placeholder="Enter Place">
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-danger" (click)="confirmDelete()">Delete</button>
          <button class="btn btn-primary" (click)="updateLocation()" [disabled]="isSubmitting">Update Location</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal fade" id="deleteLocationModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Delete Confirmation</h5></div>
        <div class="modal-body"><p>Are you sure you want to delete this Training Location?</p></div>
        <div class="modal-footer">
          <button class="btn btn-primary" (click)="deleteLocation()">Ok</button>
          <button class="btn btn-label-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

</app-layout>

<!-- src/app/features/forms/forms.component.html -->
<app-layout pageTitle="Forms">

  <div class="d-flex justify-content-between align-items-center mt-3 mb-3">
    <div class="input-group" style="width:300px;">
      <span class="input-group-text bg-white border-end-0">
        <i class="fa fa-search text-muted"></i>
      </span>
      <input type="text" class="form-control border-start-0 ps-0"
             placeholder="Search forms..." [(ngModel)]="searchText">
    </div>
    <button class="btn btn-primary" (click)="openNewForm()">
      <i class="fa fa-plus me-1"></i> New Training Form
    </button>
  </div>

  <table class="table table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>Name</th><th>Type</th><th>Start Date</th>
        <th>End Date</th><th>Location</th><th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let f of filteredList" style="cursor:pointer;">
        <td>{{ f.name || '-' }}</td>
        <td>{{ f.type || '-' }}</td>
        <td>{{ f.t_start ? (f.t_start | date:'dd MMM yyyy') : '-' }}</td>
        <td>{{ f.t_end ? (f.t_end | date:'dd MMM yyyy') : '-' }}</td>
        <td>{{ f.locations || '-' }}</td>
        <td>
          <span class="badge"
            [class.bg-success]="f.status==='Completed'"
            [class.bg-warning]="f.status==='Ongoing'"
            [class.bg-info]="f.status==='Upcoming'">
            {{ f.status || 'Draft' }}
          </span>
        </td>
      </tr>
      <tr *ngIf="filteredList.length === 0">
        <td colspan="6" class="text-center text-muted py-4">No forms found</td>
      </tr>
    </tbody>
  </table>

  <!-- Form Modal -->
  <div class="modal fade" id="formModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header border-bottom pb-3">
          <h5 class="modal-title w-100">
            New Training Form
            <span class="float-end text-danger" style="font-size:12px;">(*) Required</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row">
            <div class="mb-3 col-sm-6">
              <label>Training Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" [(ngModel)]="form.name" placeholder="Enter Training Name">
            </div>
            <div class="mb-3 col-sm-6">
              <label>Training Type <span class="text-danger">*</span></label>
              <select class="form-select" [(ngModel)]="form.type">
                <option value="">-- Select Type --</option>
                <option *ngFor="let t of typeOptions" [value]="t.name">{{ t.name }}</option>
              </select>
            </div>
            <div class="mb-3 col-sm-6">
              <label>Start Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" [(ngModel)]="form.t_start">
            </div>
            <div class="mb-3 col-sm-6">
              <label>End Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" [(ngModel)]="form.t_end">
            </div>
            <div class="mb-3 col-sm-6">
              <label>Location <span class="text-danger">*</span></label>
              <select class="form-select" [(ngModel)]="form.locations">
                <option value="">-- Select Location --</option>
                <option *ngFor="let l of locationOptions" [value]="l.name">{{ l.name }}</option>
              </select>
            </div>
            <div class="mb-3 col-sm-6">
              <label>Round</label>
              <input type="text" class="form-control" [(ngModel)]="form.round" placeholder="e.g. Round 1">
            </div>
            <div class="mb-3 col-sm-12">
              <label>Details</label>
              <textarea class="form-control" rows="3" [(ngModel)]="form.detail" placeholder="Enter additional details"></textarea>
            </div>
          </div>
          <div class="text-end mt-3">
            <button class="btn btn-secondary me-2" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" (click)="submitForm()" [disabled]="isSubmitting">
              <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-1"></span>
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

</app-layout>
